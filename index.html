
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kantinho Delícia - Pizzaria Premium</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kantinho">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3132/3132693.png">
    <meta name="description" content="A melhor pizza artesanal de Praia, Cabo Verde. Peça online no Kantinho Delícia.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .font-crimson {
            font-family: 'Crimson Text', serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #dc2626;
        }

        /* Estilos de Impressão Corrigidos */
        @media print {
            @page {
                margin: 0;
                size: auto;
            }
            html, body {
                height: 100%;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
                color: #000 !important;
                overflow: visible !important;
            }
            #root {
                display: none !important;
            }
            .no-print {
                display: none !important;
            }
            .print-section {
                display: block !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 80mm !important; /* Largura padrão térmica */
                padding: 4mm !important;
                margin: 0 !important;
                visibility: visible !important;
                opacity: 1 !important;
                background: white !important;
            }
        }
        
        .print-section {
            display: none;
            visibility: hidden;
        }

        /* Fly to cart animation - Ajustado para o Header */
        @keyframes flyToCart {
          0% { 
            transform: translate(-50%, -50%) scale(1) rotate(0deg); 
            opacity: 1; 
          }
          40% {
            opacity: 0.9;
            transform: translate(-50%, calc(-50% - 100px)) scale(0.8) rotate(45deg);
          }
          100% { 
            transform: translate(calc(100vw - 120px), calc(-100% + 60px)) scale(0.1) rotate(720deg); 
            opacity: 0; 
          }
        }
        .animate-fly-to-cart {
          animation: flyToCart 0.9s cubic-bezier(0.175, 0.885, 0.32, 1) forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-950 text-slate-50 overflow-x-hidden">
    <div id="root"></div>
    <!-- Área de impressão externa ao root para evitar herança de display:none -->
    <div id="print-area" class="print-section"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          try {
            const swUrl = new URL('sw.js', window.location.href).href;
            navigator.serviceWorker.register(swUrl)
              .then(reg => {
                console.log('Service Worker registrado com sucesso na scope:', reg.scope);
              })
              .catch(err => {
                console.warn('Registro de Service Worker ignorado ou falhou (comum em previews):', err.message);
              });
          } catch (e) {
            console.warn('Erro ao preparar registro do Service Worker:', e);
          }
        });
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
